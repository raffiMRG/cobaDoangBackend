# version: '3.8'

services:
  app:
    build: .
    container_name: go-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${APP_PORT}:${APP_PORT}"
    environment:
      DB_APP_HOST: ${DB_APP_HOST}
      API_BASEURL: ${API_BASEURL}
      APP_PORT: ${APP_PORT}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      SRC_DIR: /sementara
      DST_DIR: /new
      JWT_SECRET: ${JWT_SECRET}
      # Go's mime/multipart caps a parsed form at 1000 parts by default
      # (regardless of MaxMultipartMemory byte size) — /upload/folder gets
      # one multipart part per page image, so any zip with >1000 pages
      # (e.g. a bundled complete-series zip) hits "multipart: message too
      # large" even though it's well under the byte-size limit. Raised with
      # headroom above real-world volume sizes.
      GODEBUG: multipartmaxparts=5000
    networks:
      - manga-network
    volumes:
      # - .:/app
      - ${SRC_DIR}:/sementara
      - ${DST_DIR}:/new

  mysql:
    image: mysql:8.0
    container_name: mysql_manga
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - manga-network

  migrate:
    image: migrate/migrate
    container_name: manga-migration
    volumes:
      # - ./cobaDoangBackend/migrations:/migrations
      - ./migrations:/migrations
    command: [ "-path", "/migrations", "-database", "${MYSQL_URI}", "up" ]
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - manga-network

volumes:
  mysql_data:
    driver: local

networks:
  manga-network:
    driver: bridge

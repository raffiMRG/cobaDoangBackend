name: Auto Deploy

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/manga-app-backend:latest .

      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/manga-app-backend:latest

  deploy:
    runs-on: self-hosted
    needs: build

    steps:
      - name: Pull image
        run: docker compose pull

      - name: Restart container
        run: docker compose up -d

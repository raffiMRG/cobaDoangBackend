name: Deploy App

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Image
        run: docker build -t raffimrg/manga-app-backend:latest .

      - name: Push Image
        run: docker push raffimrg/manga-app-backend:latest

  deploy:
    runs-on: self-hosted
    needs: build

    steps:
      - name: Go to app directory
        run: cd /path/project

      - name: Pull latest image
        run: |
          cd /path/project
          docker compose pull

      - name: Restart containers
        run: |
          cd /path/project
          docker compose up -d
